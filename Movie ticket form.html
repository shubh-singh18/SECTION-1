<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie ticket form</title>
    <style>
        .ticket {
            border: 2px solid black;
            width: 30%;
            background-color: red;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border-color: blue;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            background-color: darkblue;
        }
        h1 {
            text-align: center;
        }
     

    </style>
</head>
<body>
    
    <div class="ticket">
       <h1>Movie Ticket Application Form</h1>
       <img src="movie.jpg" alt="movie logo"><br>

       <label for="">Movie title</label>
       <br>
        <input type="text" required minlength="20">
        <br>
        <br>

        <label for="">The date you want to attend:</label>
        <br>
        <input type="date">
        <br><br>

        <label for="">What time suits you?</label>
        <br>
        <input type="time">
        <br><br>
        <label for="">Number of tickets</label>
        <br>
        <input type="number">
        <br><br>
        <Email for="">Email Address</label>
        <br>
        <input type="Email Address">
        <br><br>
        <label for="">Reservation name:</label>
        <br>
        <input type="text">
        <br><br>
        <button type="submit">submit</button>
        
    
    </div>
</body>
</html>
