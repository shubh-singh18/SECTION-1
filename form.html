<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
</head>
<body>
    <h1>Student admission form</h1>
    <form >

        <label for="">student name</label>
         <input type="text" required minlength="4"><br>
        <br>
        <br>
        <label for="">student email</label>
       
        <input type ="email"><br>
  
        <label for="">Date of Birth</label>
        <input type="date"><br>
       <label>Address</label>
       <textarea rows="4" cols="1"></textarea>
          <br>
          <br>
      <label for="">Gender</label>
      <input type="radio"name="gender">male
       <input type="radio"name="gender">female
       <br><br>

       <label for="">Select course</label>
       <select>
        <option>MERN Stack Development</option>
         <option>Data Science</option>
          <option>Data Analytics</option>
           <option>Devops</option>
            <option>UI UX</option>
       </select>
       <br><br>

       <label for="">Select college</label>
       <input type="text"list="college">

       <datalist id="college">

         <option>SRMCEM</option>
          <option>BBDITM</option>
           <option>NPGC</option>
            <option>BBAU</option>
             <option>AMITY</option>
       </datalist>
       <br><br>


       <input type="checkbox" id="terms">
       <label for="terms">Accept Terms & conditions</label>

</html>
