<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="practice.css">
    <style>
        h2{
            color: blue;
            text-decoration:underline wavy;
        }
        .text {
            color: gray;
            border: 1px solid chocolate;
        }
        .mytext {color: red;
            background-color: yellow;
            font-weight: bold;

        }
        #mytext {
            color: black;
            background-color: red;
        }

    </style>
</head>
<body>
    <h1 style="color: blue; background-color: brown; font-size: 60px;">Inline CSS is used to style individual tag only</h1>
    <h2>>Internal CSS is used to style multiple tags at once</h2>
    <h2 class="text">>Name Selector is used to select elements by their tag name</h2>
    <p class="mytext">Class selector is used to select elements by their class name</p>
    <p id="mytext">ID Selector is used to select elements by their ID name</p>
    <button class="btn">Submit</button>
</body>
</html>
